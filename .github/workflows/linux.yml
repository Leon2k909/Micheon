# Builds the Linux artifacts (AppImage + deb) for every version tag and
# attaches them to that tag's GitHub release. Linux can't be cross-built from
# the Windows dev machine (native modules), so CI owns this platform.
name: linux-release

on:
  push:
    tags: ["v*"]
  # Releases are created via the API here, which doesn't fire tag-push events —
  # this trigger covers that path.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach Linux builds to (e.g. v1.0.27)"
        required: true

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build UI
        run: npm run build

      - name: Package Linux (AppImage + deb)
        run: npx electron-builder --linux --publish never
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
        run: |
          gh release upload "$TAG" \
            release/*.AppImage \
            release/*.deb \
            release/latest-linux.yml \
            --clobber --repo "$GITHUB_REPOSITORY"
